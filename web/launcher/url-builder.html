<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pyxel Web Launcher</title>
    <link rel="icon" href="../../wasm/images/pyxel_icon_64x64.ico" />
    <link rel="stylesheet" href="../styles.css" />
    <script src="../shared.js"></script>
  </head>

  <body class="page h-full">
    <main class="page-container" id="app">
      <header class="flex items-start gap-4 mb-4">
        <select
          id="lang-select"
          class="lang-select mt-1"
          aria-label="Language"
          style="display: none"
        ></select>
        <div class="flex-1 min-w-0 order-first">
          <h1 id="page-title" class="font-semibold text-2xl tracking-tight">
            Pyxel Web Launcher
          </h1>
          <p id="page-subtitle" class="mt-2 text-gray-300 text-sm">
            Launch tool for the web version of
            <a
              class="link"
              href="https://github.com/kitao/pyxel"
              target="_blank"
              rel="noopener noreferrer"
              >Pyxel</a
            >, a retro game engine for Python.
          </p>
        </div>
      </header>

      <section class="card">
        <div class="gap-5 grid grid-cols-1">
          <!-- Startup File -->
          <div class="gap-2 grid">
            <label
              for="startup-file"
              class="label"
              data-i18n="label_startup_file"
              >Startup File URL on GitHub</label
            >
            <input
              id="startup-file"
              type="text"
              size="60"
              class="input"
              placeholder="https://github.com/USER/REPO/blob/BRANCH/PATH/TO/APP.pyxapp"
            />
            <ul class="help">
              <li id="help-file-type">
                Startup file type should be
                <code class="chip">.py</code> or
                <code class="chip">.pyxapp</code>.
              </li>
              <li>
                <span id="help-examples"></span>
                <div class="mt-1 pl-2 grid gap-1">
                  <div id="help-example-py"></div>
                  <div id="help-example-pyxapp"></div>
                </div>
              </li>
            </ul>
          </div>

          <!-- Virtual Gamepad -->
          <div class="flex items-center gap-2">
            <label
              for="virtual-gamepad"
              class="label"
              data-i18n="label_virtual_gamepad"
              >Enable Virtual Gamepad</label
            >
            <input
              id="virtual-gamepad"
              type="checkbox"
              checked
              class="checkbox"
            />
          </div>

          <!-- Launch URL -->
          <div class="gap-2 grid pt-2">
            <span class="label" data-i18n="label_launch_url"
              >Application Launch URL</span
            >
            <a
              id="launch-url"
              tabindex="0"
              target="_blank"
              rel="noopener noreferrer"
              class="input-link block"
            ></a>
          </div>
        </div>
      </section>

      <section class="mt-4">
        <p id="footer-text" class="mt-4 text-gray-300 text-sm">
          For specific instructions, please refer to
          <a
            class="link"
            href="../web-usage/"
            target="_blank"
            rel="noopener noreferrer"
            >this page</a
          >.
        </p>
      </section>
    </main>

    <script>
      let data = null;
      let lang = "en";

      function getFileExt(url) {
        const match = url.match(/\.([^./?#]+)$/);
        return match ? match[1] : "";
      }

      function cmdChip(name) {
        return `<span class="inline-block w-[46px]">${chip(name)}</span>`;
      }

      function updateTexts() {
        // Title and subtitle
        document.title = t("title");
        document.getElementById("page-title").textContent = t("title");
        document.getElementById("page-subtitle").innerHTML = t(
          "subtitle",
        ).replace("{0}", link("https://github.com/kitao/pyxel", "Pyxel"));

        // Labels
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          el.textContent = t(el.dataset.i18n);
        });

        // Help: file type + examples
        document.getElementById("help-file-type").innerHTML = t(
          "help_file_type",
        )
          .replace("{0}", chip(".py"))
          .replace("{1}", chip(".pyxapp"));
        const pyUrl =
          "https://github.com/kitao/pyxel/blob/main/python/pyxel/examples/01_hello_pyxel.py";
        const pyxappUrl =
          "https://github.com/kitao/pyxel/blob/main/python/pyxel/examples/apps/megaball.pyxapp";
        document.getElementById("help-examples").textContent =
          t("help_examples");
        document.getElementById("help-example-py").innerHTML =
          cmdChip("run") + link(pyUrl, pyUrl);
        document.getElementById("help-example-pyxapp").innerHTML =
          cmdChip("play") + link(pyxappUrl, pyxappUrl);

        // Footer
        const docUrl = "../web-usage/";
        document.getElementById("footer-text").innerHTML = t("footer").replace(
          "{0}",
          link(docUrl, t("footer_link")),
        );

        setDocLang(lang);
      }

      function buildLaunchUrl() {
        const startupFile = document.getElementById("startup-file").value;
        const virtualGamepad =
          document.getElementById("virtual-gamepad").checked;
        const launchLink = document.getElementById("launch-url");
        launchLink.textContent = launchLink.href = "";

        const ext = getFileExt(startupFile);

        if (
          !startupFile.startsWith("https://github.com/") ||
          !(ext === "py" || ext === "pyxapp")
        ) {
          return;
        }

        // https://github.com/USER/REPO/blob/BRANCH/PATH/TO/FILE.ext
        const paths = startupFile.split("/");
        if (paths.length < 8) return;
        const user = paths[3];
        const repo = paths[4];
        const branch = paths[6];
        const filePath = paths.slice(7).join("/");
        const filePathNoExt = filePath.replace(/\.[^.]+$/, "");
        const command = ext === "py" ? "run" : "play";
        let launchUrl = `https://kitao.github.io/pyxel/web/launcher/?${command}=${user}/${repo}/${branch}/${filePathNoExt}`;

        if (virtualGamepad) {
          launchUrl += "&gamepad=enabled";
        }

        launchLink.textContent = launchLink.href = launchUrl;
      }

      document
        .getElementById("startup-file")
        .addEventListener("input", buildLaunchUrl);
      document
        .getElementById("virtual-gamepad")
        .addEventListener("change", buildLaunchUrl);

      // Init i18n
      fetch("launcher.json")
        .then((r) => r.json())
        .then((json) => {
          data = json;
          lang = detectLang(data.languages);
          buildLangSelector(
            data.languages,
            lang,
            (v) => {
              lang = v;
              updateTexts();
            },
            document.getElementById("lang-select"),
          );

          updateTexts();
        })
        .catch((e) => console.error("Failed to load data:", e));
    </script>
  </body>
</html>
